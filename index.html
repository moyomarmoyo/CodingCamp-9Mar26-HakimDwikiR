<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ═══════════════ HEADER ═══════════════ -->
  <header class="header-bar">
    <div class="header-left">
      <button id="themeToggle" class="icon-btn" title="Toggle theme" aria-label="Toggle light/dark mode">
        <span class="icon-sun">☀️</span>
        <span class="icon-moon">🌙</span>
      </button>
    </div>

    <div class="clock-block">
      <div id="clock" class="clock">00:00:00</div>
      <div id="dateDisplay" class="date-display"></div>
      <div id="greeting" class="greeting"></div>
    </div>

    <div class="header-right">
      <button id="nameBtn" class="icon-btn" title="Set your name" aria-label="Set your name">✏️</button>
    </div>
  </header>

  <!-- ═══════════════ NAME MODAL ═══════════════ -->
  <div id="nameModal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="nameModalTitle">
    <div class="modal-card">
      <h2 id="nameModalTitle">What's your name?</h2>
      <p>Personalise your greeting</p>
      <input id="nameInput" type="text" class="modal-input" placeholder="e.g. Alex" maxlength="30" />
      <div class="modal-actions">
        <button id="nameSave" class="btn btn-primary">Save</button>
        <button id="nameCancel" class="btn btn-ghost">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════ MAIN GRID ═══════════════ -->
  <main class="dashboard-grid">

    <!-- ── FOCUS TIMER ── -->
    <section class="card timer-card" aria-label="Focus Timer">
      <h2 class="card-title">Focus Timer</h2>

      <div class="timer-display-wrap">
        <svg class="timer-ring" viewBox="0 0 120 120" aria-hidden="true">
          <circle class="ring-bg" cx="60" cy="60" r="52" />
          <circle id="ringProgress" class="ring-progress" cx="60" cy="60" r="52" />
        </svg>
        <div id="timerDisplay" class="timer-digits">25:00</div>
      </div>

      <div class="timer-duration-row">
        <label for="pomoDuration" class="sr-only">Pomodoro duration (minutes)</label>
        <span class="duration-label">Duration</span>
        <input id="pomoDuration" type="number" class="duration-input" min="1" max="99" value="25" aria-label="Set timer duration in minutes" />
        <span class="duration-label">min</span>
      </div>

      <div class="timer-controls">
        <button id="timerStart" class="btn btn-primary">Start</button>
        <button id="timerPause" class="btn btn-secondary" disabled>Pause</button>
        <button id="timerReset" class="btn btn-ghost">Reset</button>
      </div>

      <p id="timerStatus" class="timer-status">Ready to focus</p>
    </section>

    <!-- ── TO-DO LIST ── -->
    <section class="card todo-card" aria-label="To-Do List">
      <div class="todo-header">
        <h2 class="card-title">Tasks</h2>
        <div class="todo-toolbar">
          <select id="sortSelect" class="sort-select" aria-label="Sort tasks">
            <option value="added">Sort: Added</option>
            <option value="az">A → Z</option>
            <option value="za">Z → A</option>
            <option value="done">Done last</option>
          </select>
        </div>
      </div>

      <div class="todo-input-row">
        <input id="taskInput" type="text" class="task-input" placeholder="Add a new task…" maxlength="100" aria-label="New task text" />
        <button id="addTaskBtn" class="btn btn-primary">Add</button>
      </div>
      <p id="dupWarning" class="dup-warning hidden" role="alert">Task already exists!</p>

      <ul id="taskList" class="task-list" aria-label="Task list" aria-live="polite"></ul>

      <div class="todo-footer">
        <span id="taskCount" class="task-count"></span>
        <button id="clearDone" class="btn btn-ghost btn-sm">Clear done</button>
      </div>
    </section>

    <!-- ── QUICK LINKS ── -->
    <section class="card links-card" aria-label="Quick Links">
      <h2 class="card-title">Quick Links</h2>

      <div class="link-input-row">
        <input id="linkName" type="text" class="link-field" placeholder="Label" maxlength="20" aria-label="Link label" />
        <input id="linkUrl"  type="url"  class="link-field link-url" placeholder="https://…" aria-label="Link URL" />
        <button id="addLinkBtn" class="btn btn-primary">Add</button>
      </div>

      <div id="linkGrid" class="link-grid" aria-label="Saved links"></div>
    </section>

  </main>

  <!-- ═══════════════ EDIT TASK MODAL ═══════════════ -->
  <div id="editModal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="editModalTitle">
    <div class="modal-card">
      <h2 id="editModalTitle">Edit Task</h2>
      <input id="editInput" type="text" class="modal-input" maxlength="100" />
      <div class="modal-actions">
        <button id="editSave" class="btn btn-primary">Save</button>
        <button id="editCancel" class="btn btn-ghost">Cancel</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
